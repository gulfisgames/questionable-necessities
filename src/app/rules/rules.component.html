<ion-content>
    <app-guide [name]="name" />
    <ion-item lines="full">
        <ion-icon name="search-outline" slot="start" />
        <ion-input
            placeholder="Search rules"
            [(ngModel)]="searchTerm"
            [clearInput]="true"
            (ionInput)="onSearch($any($event))"
            aria-label="Search rules"
        />
    </ion-item>
    <ion-grid>
        <ion-row>
            @for (
                rule of visibleRules;
                track rule.id;
                let i = $index;
                let isFirst = $first;
                let isLast = $last
            ) {
                <ion-col size="12" size-lg="6" size-xl="4">
                    <app-rule-card
                        [rule]="rule"
                        [disableMove]="searching"
                        [isFirst]="isFirst"
                        [isLast]="isLast"
                        (openRule)="onOpen(rule)"
                        (moveRule)="onMove($event, i)"
                    />
                </ion-col>
            }
            @if (visibleRules.length === 0) {
                <ion-col class="ion-text-center ion-padding ion-margin">
                    <ion-button
                        class="italic"
                        fill="clear"
                        color="medium"
                        (click)="searchTerm = ''"
                    >
                        No rules with '{{ searchTerm }}'
                    </ion-button>
                </ion-col>
            }
        </ion-row>
    </ion-grid>
    <ion-row>
        <ion-col>
            <ion-item
                class="ion-padding-vertical"
                button
                detail="false"
                lines="none"
                (click)="addRule()"
            >
                <ion-icon name="add" slot="start" />
                <ion-label>Add Rule</ion-label>
            </ion-item>
        </ion-col>
        <ion-col size="3">
            <app-json-importer
                variant="item"
                [label]="importLabel"
                (importEvent)="import($event)"
            />
        </ion-col>
        <ion-col size="3">
            <app-json-exporter
                variant="item"
                [json]="rules"
                [label]="exportLabel"
            />
        </ion-col>
    </ion-row>

    <ion-modal
        #ruleModal
        [isOpen]="!!rule"
        [canDismiss]="canDismiss"
        (didDismiss)="onDismiss()"
    >
        <ng-template>
            <ion-header>
                <ion-toolbar>
                    <ion-title
                        size="small"
                        class="text-2xl font-bold ion-text-start"
                    >
                        {{ rule?.title || 'Untitled Rule' }}
                    </ion-title>
                    <ion-buttons slot="end">
                        <ion-button (click)="ruleModal.dismiss()">
                            Close
                        </ion-button>
                    </ion-buttons>
                </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding-horizontal ion-padding-bottom">
                @if (rule) {
                    <form #ruleForm="ngForm">
                        <app-editable
                            [editable]="rule"
                            [form]="ruleForm"
                            [skipPreview]="isDefaultRule(rule)"
                            (save)="onSave($event)"
                            (delete)="onDelete($event)"
                        >
                            <ng-template #preview>
                                @if (rule.summary) {
                                    <markdown
                                        class="ion-display-block ion-margin-horizontal ion-padding-bottom border-bottom"
                                        [data]="rule.summary"
                                    />
                                }
                                <markdown
                                    class="ion-display-block ion-margin-horizontal"
                                    [data]="rule.details"
                                />
                            </ng-template>

                            <ng-template #edit>
                                <ion-item>
                                    <ion-textarea
                                        label="Title"
                                        labelPlacement="stacked"
                                        [autoGrow]="true"
                                        [rows]="1"
                                        placeholder="Name the rule"
                                        [(ngModel)]="rule.title"
                                        name="title"
                                    />
                                </ion-item>
                                <ion-item>
                                    <ion-textarea
                                        label="Summary"
                                        labelPlacement="stacked"
                                        [autoGrow]="true"
                                        [rows]="12"
                                        placeholder="Add a summary for quick lookup"
                                        [(ngModel)]="rule.summary"
                                        name="summary"
                                    />
                                </ion-item>
                                <ion-item lines="none">
                                    <ion-textarea
                                        label="Details"
                                        labelPlacement="stacked"
                                        [autoGrow]="true"
                                        [rows]="6"
                                        placeholder="Add a detailed description"
                                        [(ngModel)]="rule.details"
                                        name="details"
                                    />
                                </ion-item>
                            </ng-template>
                        </app-editable>
                    </form>
                }
            </ion-content>
        </ng-template>
    </ion-modal>
    <app-footer />
</ion-content>
