<ion-content>
    <app-guide [name]="name" />
    <ion-item lines="full">
        <ion-icon name="search-outline" slot="start" />
        <ion-input
            placeholder="Search scenes"
            [(ngModel)]="searchTerm"
            [clearInput]="true"
            (ionInput)="onSearch($any($event))"
            aria-label="Search scenes"
        />
    </ion-item>
    <ion-list lines="full">
        <ion-accordion-group
            [multiple]="true"
            [value]="openSceneIds"
            (ionChange)="onToggleScene($any($event))"
        >
            <ion-reorder-group
                [disabled]="searching"
                (ionReorderEnd)="onReorderEnd($any($event))"
            >
                @for (scene of visibleScenes; track scene.id) {
                    <ion-accordion [value]="scene.id">
                        <ion-item slot="header">
                            <ion-reorder slot="start" />
                            <ion-label class="ion-text-wrap">
                                <ion-row class="ion-align-items-baseline">
                                    <ion-col
                                        size="12"
                                        sizeSm="auto"
                                        class="ion-no-padding ion-margin-end"
                                    >
                                        {{ scene.date | date: 'mediumDate' }}
                                    </ion-col>
                                    <ion-col class="ion-no-padding">
                                        <h2>
                                            {{
                                                scene.title || 'Untitled Scene'
                                            }}
                                        </h2>
                                    </ion-col>
                                </ion-row>
                                @if (scene.description) {
                                    <ion-label class="mt-1">
                                        {{ scene.description }}
                                    </ion-label>
                                }
                            </ion-label>
                        </ion-item>
                        <div slot="content" class="ion-padding-horizontal">
                            @if (isOpen(scene.id)) {
                                <form #sceneForm="ngForm">
                                    <app-editable
                                        [editable]="scene"
                                        [form]="sceneForm"
                                        [skipPreview]="isDefaultScene(scene)"
                                        (save)="onSave($event)"
                                        (delete)="onDelete($event)"
                                    >
                                        <ng-template #preview>
                                            <markdown
                                                class="ion-display-block ion-margin-horizontal"
                                                [data]="scene.notes"
                                            />
                                        </ng-template>

                                        <ng-template #edit>
                                            <ion-row>
                                                <ion-col size="12" sizeMd="4">
                                                    <ion-item
                                                        button="true"
                                                        [detail]="false"
                                                        [id]="scene.id"
                                                        class="editor-field"
                                                    >
                                                        <ion-input
                                                            label="Date"
                                                            labelPlacement="stacked"
                                                            [readonly]="true"
                                                            [value]="
                                                                scene.date
                                                                    | date
                                                                        : 'mediumDate'
                                                            "
                                                        />
                                                    </ion-item>
                                                    <ion-popover
                                                        [trigger]="scene.id"
                                                        [keepContentsMounted]="
                                                            true
                                                        "
                                                    >
                                                        <ng-template>
                                                            <ion-datetime
                                                                presentation="date"
                                                                [firstDayOfWeek]="
                                                                    1
                                                                "
                                                                [(ngModel)]="
                                                                    scene.date
                                                                "
                                                                name="date"
                                                            />
                                                        </ng-template>
                                                    </ion-popover>
                                                </ion-col>
                                                <ion-col size="12" sizeMd="8">
                                                    <ion-item
                                                        class="editor-field"
                                                    >
                                                        <ion-input
                                                            label="Title"
                                                            labelPlacement="stacked"
                                                            placeholder="Name the scene"
                                                            [(ngModel)]="
                                                                scene.title
                                                            "
                                                            name="title"
                                                        />
                                                    </ion-item>
                                                </ion-col>
                                                <ion-col size="12">
                                                    <ion-item>
                                                        <ion-textarea
                                                            label="Description"
                                                            labelPlacement="stacked"
                                                            [autoGrow]="true"
                                                            [rows]="2"
                                                            placeholder="Describe the scene in a sentence"
                                                            [(ngModel)]="
                                                                scene.description
                                                            "
                                                            name="description"
                                                        />
                                                    </ion-item>
                                                </ion-col>
                                                <ion-col size="12">
                                                    <ion-item lines="none">
                                                        <ion-textarea
                                                            label="Notes"
                                                            labelPlacement="stacked"
                                                            [autoGrow]="true"
                                                            [rows]="6"
                                                            placeholder="Write detailed scene notes"
                                                            [(ngModel)]="
                                                                scene.notes
                                                            "
                                                            name="notes"
                                                        />
                                                    </ion-item>
                                                </ion-col>
                                            </ion-row>
                                        </ng-template>
                                    </app-editable>
                                </form>
                            }
                        </div>
                    </ion-accordion>
                }
            </ion-reorder-group>
        </ion-accordion-group>
        @if (visibleScenes.length === 0) {
            <ion-item lines="none" class="ion-padding ion-margin">
                <ion-button
                    size="default"
                    class="italic m-auto"
                    fill="clear"
                    color="medium"
                    (click)="searchTerm = ''"
                >
                    No scenes with '{{ searchTerm }}'
                </ion-button>
            </ion-item>
        }
        <ion-row>
            <ion-col>
                <ion-item
                    class="ion-padding-vertical"
                    button
                    detail="false"
                    lines="none"
                    (click)="addScene()"
                >
                    <ion-icon name="add" slot="start" />
                    <ion-label>Add Scene</ion-label>
                </ion-item>
            </ion-col>
            <ion-col size="3">
                <app-json-importer
                    variant="item"
                    [label]="importLabel"
                    (importEvent)="import($event)"
                />
            </ion-col>
            <ion-col size="3">
                <app-json-exporter
                    variant="item"
                    [json]="scenes"
                    [label]="exportLabel"
                />
            </ion-col>
        </ion-row>
    </ion-list>
    <app-footer />
</ion-content>
