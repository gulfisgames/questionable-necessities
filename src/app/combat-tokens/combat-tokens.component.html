<ion-content>
    <ion-grid>
        <app-guide [name]="name" />
        <ion-row>
            <ion-col size="12" size-xl="6">
                <app-json-importer
                    [label]="importLabel"
                    expand="block"
                    fill="outline"
                    size="large"
                    classes="ion-margin"
                    (importEvent)="setTokens($event)"
                />
                <ion-progress-bar value="1" color="light" />
                <app-combat-token-editor
                    [token]="token"
                    (saveTokenEvent)="saveToken($event)"
                />
                <ion-progress-bar value="1" color="light" />
                <app-combat-token-sets
                    (loadTokenSetEvent)="loadTokenSet($event)"
                />
            </ion-col>
            <ion-col size="12" size-xl="6">
                <app-combat-tokens-controls [tokens]="tokens" />
                <app-combat-tokens-viewer
                    [tokens]="tokens"
                    (deleteTokenEvent)="deleteToken($event)"
                />
            </ion-col>
        </ion-row>
    </ion-grid>
    <app-footer />
</ion-content>
